<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện ảnh tương tác</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <h1 class="title">Interactive Photo Gallery</h1>

<!-- Khung hiển thị lớn -->
<div id="image">
    <span id="image-text">Di chuột qua một hình ảnh bên dưới để hiển thị ở đây.</span>
</div>

<!-- Danh sách các ảnh nhỏ -->
<div class="gallery">
    <img class="preview" 
         src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&auto=format&fit=crop" 
         alt="Thung lũng Yosemite hùng vĩ dưới ánh nắng vàng" 
         onmouseover="upDate(this)" 
         onmouseout="unDo()">
    
    <img class="preview" 
         src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600&auto=format&fit=crop" 
         alt="Hồ nước trong xanh phản chiếu rặng núi vùng Alps" 
         onmouseover="upDate(this)" 
         onmouseout="unDo()">
    
    <img class="preview" 
         src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&auto=format&fit=crop" 
         alt="Sương mù mờ ảo bao phủ thung lũng xanh ngắt" 
         onmouseover="upDate(this)" 
         onmouseout="unDo()">
         
    <img class="preview" 
         src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&auto=format&fit=crop" 
         alt="Tia nắng ban mai xuyên qua rừng cây cổ thụ" 
         onmouseover="upDate(this)" 
         onmouseout="unDo()">
</div>

    <script src="script.js"></script>
</body>
</html>
